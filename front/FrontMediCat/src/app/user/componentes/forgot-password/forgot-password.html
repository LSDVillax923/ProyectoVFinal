<div class="box">
  <h2>¿Olvidaste tu contraseña?</h2>

  <p>No te preocupes, te enviaremos instrucciones para recuperarla</p>

  <p *ngIf="mensaje" class="flash-message flash-message-success">{{ mensaje }}</p>
  <p *ngIf="error" class="flash-message flash-message-error">{{ error }}</p>

  <form (ngSubmit)="enviarInstrucciones()" #forgotForm="ngForm">
    <label for="email">Correo Electrónico</label>
    <input
      id="email"
      type="email"
      placeholder="tu@email.com"
      name="email"
      [(ngModel)]="email"
      required
      email
    />

    <button type="submit" [disabled]="forgotForm.invalid">Enviar Instrucciones</button>
  </form>

  <a routerLink="/inicio/login" class="back">← Volver a Iniciar Sesión</a>
</div>
