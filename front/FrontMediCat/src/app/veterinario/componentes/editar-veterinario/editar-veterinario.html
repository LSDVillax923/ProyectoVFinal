<app-navbar></app-navbar>

<main class="dashboard">
  <section class="dashboard-header">
    <a routerLink="/veterinarios" class="btn-volver">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Volver a Veterinarios
    </a>
    <h1 class="dashboard-title">Editar Veterinario</h1>
    <p class="dashboard-subtitle">Actualiza la información del profesional</p>
  </section>

  <p *ngIf="mensaje" class="alert alert-success">{{ mensaje }}</p>
  <p *ngIf="error" class="alert alert-error">{{ error }}</p>

  <div class="form-card" *ngIf="!noEncontrado">
    <form (ngSubmit)="guardarCambios()">
      <div class="form-grid">

        <div class="form-group full-width">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" [(ngModel)]="formData.nombre" autocomplete="name" required />
        </div>

        <div class="form-group">
          <label for="cedula">Cédula</label>
          <input type="text" id="cedula" name="cedula" [(ngModel)]="formData.cedula" required />
        </div>

        <div class="form-group">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" [(ngModel)]="formData.correo" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="celular">Celular</label>
          <input type="text" id="celular" name="celular" [(ngModel)]="formData.celular" autocomplete="tel" required />
        </div>

        <div class="form-group">
          <label for="contrasenia">Contraseña</label>
          <input type="password" id="contrasenia" name="contrasenia" [(ngModel)]="formData.contrasenia" autocomplete="new-password" />
          <small class="form-hint">"Obligatorio" Cambiar la contraseña o colocar la misma para verificar</small>
        </div>

        <div class="form-group full-width">
          <label for="especialidad">Especialidad</label>
          <select id="especialidad" name="especialidad" [(ngModel)]="formData.especialidad" required>
            <option *ngFor="let esp of especialidades" [value]="esp">{{ esp }}</option>
          </select>
        </div>

      </div>

      <div class="form-acciones">
        <button type="submit" class="btn-guardar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Guardar Cambios
        </button>
        <a routerLink="/veterinarios" class="btn-cancelar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Cancelar
        </a>
      </div>
    </form>
  </div>
</main>
