<app-navbar></app-navbar>

<main class="dashboard">
  <section class="dashboard-header">
    <a routerLink="/mascotas" class="btn-volver">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Volver al listado
    </a>
    <h1 class="dashboard-title">Nueva Mascota</h1>
    <p class="dashboard-subtitle">Completa el formulario para registrar una nueva mascota</p>
  </section>

  <p *ngIf="mascotaRegistrada" class="alert alert-success">{{ mascotaRegistrada }}</p>
  <p *ngIf="error" class="alert alert-error">{{ error }}</p>

  <div class="form-card">
    <form (ngSubmit)="registrarMascota()" #formMascota="ngForm">
      <div class="form-grid">

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" [(ngModel)]="mascotaForm.nombre" placeholder="Ej. Firulais" required />
        </div>

        <div class="form-group">
          <label for="especie">Especie</label>
          <input type="text" id="especie" name="especie" [(ngModel)]="mascotaForm.especie" placeholder="Ej. Perro" required />
        </div>

        <div class="form-group">
          <label for="raza">Raza</label>
          <input type="text" id="raza" name="raza" [(ngModel)]="mascotaForm.raza" placeholder="Ej. Labrador" required />
        </div>

        <div class="form-group">
          <label for="sexo">Sexo</label>
          <select id="sexo" name="sexo" [(ngModel)]="mascotaForm.sexo" required>
            <option value="" disabled>Selecciona</option>
            <option value="Macho">Macho</option>
            <option value="Hembra">Hembra</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fechaNacimiento">Fecha de nacimiento</label>
          <input type="date" id="fechaNacimiento" name="fechaNacimiento" [(ngModel)]="mascotaForm.fechaNacimiento" />
        </div>

        <div class="form-group">
          <label for="edad">Edad (años)</label>
          <input type="number" id="edad" name="edad" [(ngModel)]="mascotaForm.edad" min="0" placeholder="Ej. 3" required />
        </div>

        <div class="form-group">
          <label for="peso">Peso (kg)</label>
          <input type="number" id="peso" name="peso" [(ngModel)]="mascotaForm.peso" step="0.1" min="0" placeholder="Ej. 10.5" required />
        </div>

        <div class="form-group">
  <label for="estado">Estado</label>
  <select id="estado" name="estado" [(ngModel)]="mascotaForm.estado" required> <option value="" disabled>Selecciona un estado</option>
    <option value="ACTIVA">Activa</option>
    <option value="TRATAMIENTO">En Tratamiento</option>
    <option value="INACTIVA">Inactiva</option>
  </select>
</div>

        <div class="form-group full-width">
          <label for="clienteId">Propietario</label>
          <select id="clienteId" name="clienteId" [(ngModel)]="mascotaForm.clienteId" required>
            <option [ngValue]="null" disabled>Selecciona el propietario</option>
            <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">
              {{ cliente.nombre }} {{ cliente.apellido }}
            </option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="enfermedad">Enfermedad / diagnóstico</label>
          <input type="text" id="enfermedad" name="enfermedad" [(ngModel)]="mascotaForm.enfermedad" placeholder="Dejar en blanco si está sano" />
        </div>

        <div class="form-group full-width">
          <label for="veterinarioAsignado">Veterinario asignado</label>
          <select id="veterinarioAsignado" name="veterinarioAsignado" [(ngModel)]="mascotaForm.veterinarioAsignado">
            <option value="">Sin veterinario asignado</option>
            <option *ngFor="let vet of veterinariosDisponibles" [value]="vet.nombre">
              {{ vet.nombre }} — {{ vet.especialidad }}
            </option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" name="observaciones" [(ngModel)]="mascotaForm.observaciones" rows="3" placeholder="Observaciones relevantes..."></textarea>
        </div>

        <div class="form-group full-width">
          <label for="foto">Foto de la mascota</label>
          <input
            type="file"
            id="foto"
            name="foto"
            accept="image/png, image/jpeg, image/gif, image/webp"
            (change)="onFotoSeleccionada($event)"
          />
          <small *ngIf="!errorFoto" class="form-hint">JPG, PNG, GIF o WEBP. Máx. 10 MB.</small>
          <small *ngIf="errorFoto" class="form-error">{{ errorFoto }}</small>
          <div *ngIf="fotoPreview" class="foto-preview">
            <img [src]="fotoPreview" alt="Vista previa de la foto" />
          </div>
        </div>

      </div>

      <div class="form-acciones">
        <button type="submit" class="btn-guardar" [disabled]="formMascota.invalid">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Registrar Mascota
        </button>
        <a routerLink="/mascotas" class="btn-cancelar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Cancelar
        </a>
      </div>
    </form>
  </div>
</main>
